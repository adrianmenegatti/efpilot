name: CI/CD Pipeline

on:
  release:
    types: [published]
  pull_request:
    branches: [ main ]

permissions:
  contents: write # Upgraded to write so the pipeline can update the release text

jobs:
  # 🚀 JOB 1: Always runs on Pull Requests AND on Releases
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Run Unit Tests
      run: dotnet test --configuration Release --no-restore --verbosity normal

  # 📦 JOB 2: ONLY runs on true GitHub Releases, and ONLY if tests pass
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release' 
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Extract Version From Tag
      id: get_version
      run: |
        TAG_NAME="${{ github.event.release.tag_name }}"
        VERSION="${TAG_NAME#v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Build and Pack
      run: |
        dotnet build --configuration Release /p:Version=${{ steps.get_version.outputs.version }}
        dotnet pack --configuration Release --output ./nupkg /p:Version=${{ steps.get_version.outputs.version }}

    - name: Push to NuGet
      run: dotnet nuget push "./nupkg/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source nuget.org

    # ✨ NEW STEP: Automatically populates the GitHub release with your changes and PR logs
    - name: Auto-Generate GitHub Release Notes
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
